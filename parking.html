<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Parking & Loading Zone Detection - Model Comparison</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: #0f1117; color: #e1e4e8; }

    header { background: #161b22; border-bottom: 1px solid #30363d; padding: 20px 40px; }
    header h1 { font-size: 22px; font-weight: 600; }
    header p { color: #8b949e; margin-top: 4px; font-size: 14px; }

    .nav-links { margin-top: 8px; }
    .nav-links a { color: #58a6ff; font-size: 13px; text-decoration: none; }
    .nav-links a:hover { text-decoration: underline; }

    .prompt-section { background: #161b22; border: 1px solid #30363d; border-radius: 8px; margin: 24px 40px 0; padding: 20px; }
    .prompt-section h3 { font-size: 13px; text-transform: uppercase; letter-spacing: 0.5px; color: #8b949e; margin-bottom: 10px; }
    .prompt-box { background: #0d1117; border: 1px solid #30363d; border-radius: 6px; padding: 14px 16px; font-family: 'SF Mono', 'Fira Code', monospace; font-size: 13px; line-height: 1.6; color: #c9d1d9; white-space: pre-wrap; width: 100%; resize: vertical; }
    .prompt-box:focus { outline: none; border-color: #58a6ff; }

    .cards-container { padding: 24px 40px; display: flex; flex-direction: column; gap: 32px; }

    .image-card { background: #161b22; border: 1px solid #30363d; border-radius: 10px; overflow: hidden; }
    .image-card-header { padding: 16px 20px; border-bottom: 1px solid #30363d; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
    .image-card-header h2 { font-size: 16px; font-weight: 600; margin-right: auto; }
    .image-card-header .badge { font-size: 12px; padding: 3px 10px; border-radius: 12px; font-weight: 500; }
    .badge-parking { background: #a371f730; color: #d2a8ff; border: 1px solid #a371f760; }

    .analyze-btn {
      background: #238636; color: #fff; border: 1px solid #2ea04366; border-radius: 6px;
      padding: 6px 16px; font-size: 13px; font-weight: 600; cursor: pointer;
      display: inline-flex; align-items: center; gap: 6px; transition: background 0.15s;
    }
    .analyze-btn:hover { background: #2ea043; }
    .analyze-btn:disabled { background: #21262d; color: #484f58; border-color: #30363d; cursor: not-allowed; }
    .analyze-btn .spinner {
      width: 14px; height: 14px; border: 2px solid #ffffff44; border-top-color: #fff;
      border-radius: 50%; animation: spin 0.6s linear infinite; display: none;
    }
    .analyze-btn.loading .spinner { display: inline-block; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .three-col { display: grid; grid-template-columns: 1fr 1fr 1fr; }
    .three-col > div { padding: 16px; border-right: 1px solid #30363d; }
    .three-col > div:last-child { border-right: none; }

    .image-previews { border-bottom: 1px solid #30363d; }

    .col-header {
      font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; color: #8b949e;
      margin-bottom: 10px; padding-bottom: 6px; border-bottom: 1px solid #30363d;
      display: flex; align-items: center; gap: 6px;
    }
    .col-header .dot { width: 8px; height: 8px; border-radius: 50%; }
    .dot-gt { background: #f0883e; }
    .dot-gemma { background: #58a6ff; }
    .dot-gemini { background: #d2a8ff; }

    .img-container { position: relative; cursor: pointer; overflow: hidden; }
    .img-container img { width: 100%; border-radius: 6px; border: 1px solid #30363d; display: block; }
    .img-container:hover { opacity: 0.9; }

    .bbox { position: absolute; border: 2px solid; border-radius: 2px; pointer-events: none; }
    .bbox-label { position: absolute; top: -16px; left: -1px; font-size: 10px; font-weight: 700; padding: 1px 4px; border-radius: 2px; font-family: monospace; white-space: nowrap; }

    .feat-colors-0 { border-color: #58a6ff; }
    .feat-colors-0 .bbox-label { background: #58a6ff; color: #0d1117; }
    .feat-colors-1 { border-color: #d2a8ff; }
    .feat-colors-1 .bbox-label { background: #d2a8ff; color: #0d1117; }
    .feat-colors-2 { border-color: #f0883e; }
    .feat-colors-2 .bbox-label { background: #f0883e; color: #0d1117; }
    .feat-colors-3 { border-color: #f85149; }
    .feat-colors-3 .bbox-label { background: #f85149; color: #0d1117; }
    .feat-colors-4 { border-color: #3fb950; }
    .feat-colors-4 .bbox-label { background: #3fb950; color: #0d1117; }
    .feat-colors-5 { border-color: #d29922; }
    .feat-colors-5 .bbox-label { background: #d29922; color: #0d1117; }

    .ground-truth { background: #0d1117; border: 1px solid #30363d; border-radius: 6px; padding: 12px; margin-top: 10px; }
    .ground-truth h4 { font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; color: #8b949e; margin-bottom: 8px; }

    .feat-row { padding: 6px 0; font-size: 13px; border-bottom: 1px solid #30363d22; }
    .feat-row:last-child { border-bottom: none; }
    .feat-type { font-weight: 600; color: #e1e4e8; }
    .feat-desc { color: #8b949e; font-size: 12px; margin-top: 2px; }
    .feat-suit {
      display: inline-block; font-size: 10px; padding: 1px 6px; border-radius: 3px;
      font-weight: 600; margin-left: 8px; vertical-align: middle;
    }
    .feat-suit.suit-yes { background: #23883040; color: #3fb950; border: 1px solid #23883060; }
    .feat-suit.suit-no { background: #da363330; color: #f85149; border: 1px solid #da363360; }
    .feat-suit.suit-maybe { background: #d29a2840; color: #d29922; border: 1px solid #d29a2860; }

    .detection-summary { background: #0d1117; border: 1px solid #30363d; border-radius: 6px; padding: 12px; margin-top: 10px; }
    .detection-summary h4 { font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; color: #8b949e; margin-bottom: 8px; }

    .no-results { color: #484f58; font-style: italic; font-size: 13px; padding: 8px 0; }

    /* Lightbox */
    .lightbox { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000000ee; z-index: 1000; justify-content: center; align-items: center; cursor: zoom-out; }
    .lightbox.active { display: flex; }
    .lightbox-inner { position: relative; max-width: 95vw; max-height: 95vh; }
    .lightbox-inner img { max-width: 95vw; max-height: 95vh; border-radius: 8px; }
    .lightbox .bbox-label { font-size: 13px; top: -20px; padding: 2px 6px; }
    .lightbox .bbox { border-width: 3px; }
    .lightbox-close { position: fixed; top: 20px; right: 30px; color: #fff; font-size: 32px; cursor: pointer; z-index: 1001; }

    @media (max-width: 1200px) {
      .three-col { grid-template-columns: 1fr; }
      .three-col > div { border-right: none; border-bottom: 1px solid #30363d; }
      .three-col > div:last-child { border-bottom: none; }
    }
  </style>
</head>
<body>

<header>
  <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;">
    <div>
      <h1>Parking & Loading Zone Detection - Model Comparison</h1>
      <p>Gemma 3n E4B-IT | Gemini 3.1 Pro &mdash; European Street Parking Analysis | DPD/Geopost Street Analytics</p>
      <div class="nav-links"><a href="/">&larr; Home</a> &nbsp;|&nbsp; <a href="/road-damage">Road Damage</a> &nbsp;|&nbsp; <a href="/shop-hours">Shop Hours</a> &nbsp;|&nbsp; <a href="/addresses">Addresses</a> &nbsp;|&nbsp; <a href="/traffic">Traffic</a></div>
    </div>
    <button class="analyze-btn" id="analyze-all-btn" onclick="analyzeAll()">
      <span class="spinner"></span>
      <span>Analyze All Images</span>
    </button>
  </div>
  <div id="analyze-progress" style="margin-top:8px;font-size:13px;color:#8b949e;display:none;"></div>
</header>

<div class="prompt-section">
  <h3>Prompt (same for all models)</h3>
  <textarea class="prompt-box" id="prompt-editor" rows="10">You are a parking and loading zone detection AI analyzing street-level images of European cities. Identify all parking-related features visible in the image.

For each feature found, provide:
- type: the type of feature (e.g. "loading_zone", "no_parking_sign", "parking_meter", "restricted_parking", "available_spot", "disabled_parking", "time_limited_parking")
- description: brief description of what you see
- suitability: whether this spot/zone is suitable for a DPD delivery van ("yes", "no", "maybe")
- bounding_box: {xmin, ymin, xmax, ymax} as percentages (0-100) of image dimensions

Return ONLY a JSON object with a "features" array. Each element must include type, description, suitability, and bounding_box.</textarea>
</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <span class="lightbox-close">&times;</span>
  <div class="lightbox-inner" id="lightbox-inner"></div>
</div>

<div class="cards-container" id="cards-container"></div>

<script>
const IMAGE_BASE = 'https://storage.googleapis.com/dpd-street-detection/parking';

const featColors = ['#58a6ff', '#d2a8ff', '#f0883e', '#f85149', '#3fb950', '#d29922'];

const imageCards = [
  { id: "paris_rivoli", location: "Paris, Rue de Rivoli", gtFeatures: [
    { type: "Restricted parking", desc: "Street-side parking along major boulevard" }
  ]},
  { id: "london_soho", location: "London, Soho", gtFeatures: [
    { type: "Loading zone / double yellow lines", desc: "Typical London street parking restrictions" }
  ]},
  { id: "berlin_mitte", location: "Berlin, Mitte", gtFeatures: [
    { type: "Street parking", desc: "Kerbside parking along Berlin street" }
  ]},
  { id: "amsterdam_centrum", location: "Amsterdam, Centrum", gtFeatures: [
    { type: "Paid parking zone", desc: "Amsterdam city centre paid parking area" }
  ]},
  { id: "madrid_centro", location: "Madrid, Centro", gtFeatures: [
    { type: "Regulated parking", desc: "Madrid SER (regulated parking) zone" }
  ]},
  { id: "brussels_louiza", location: "Brussels, Avenue Louise", gtFeatures: [
    { type: "Street parking", desc: "Boulevard parking with restrictions" }
  ]}
];

function drawFeatBoxes(container, boxes) {
  if (!container) return;
  container.querySelectorAll('.bbox').forEach(b => b.remove());
  boxes.forEach((b, i) => {
    const xmin = Math.max(0, Math.min(100, b.xmin));
    const ymin = Math.max(0, Math.min(100, b.ymin));
    const xmax = Math.max(0, Math.min(100, b.xmax));
    const ymax = Math.max(0, Math.min(100, b.ymax));
    const w = xmax - xmin;
    const h = ymax - ymin;
    if (w <= 0 || h <= 0) return;
    const colorIdx = i % featColors.length;
    const div = document.createElement('div');
    div.className = `bbox feat-colors-${colorIdx}`;
    div.style.left = xmin + '%';
    div.style.top = ymin + '%';
    div.style.width = w + '%';
    div.style.height = h + '%';
    const label = b.name || `Feature ${i + 1}`;
    div.innerHTML = `<span class="bbox-label">${label}</span>`;
    container.appendChild(div);
  });
}

function buildCard(card) {
  const imgSrc = `${IMAGE_BASE}/${card.id}.jpg`;
  const featCount = card.gtFeatures.length;

  const gtRows = card.gtFeatures.map(f =>
    `<div class="feat-row">
      <div class="feat-type">${f.type}</div>
      <div class="feat-desc">${f.desc}</div>
    </div>`
  ).join('');

  return `
  <div class="image-card" id="card-${card.id}">
    <div class="image-card-header">
      <h2>${card.location}</h2>
      <span class="badge badge-parking">${featCount} feature${featCount !== 1 ? 's' : ''} annotated</span>
    </div>
    <div class="three-col image-previews">
      <div>
        <div class="col-header"><span class="dot dot-gt"></span> Ground Truth</div>
        <div class="img-container" id="gt-container-${card.id}" onclick="openLightbox('${card.id}', 'gt')">
          <img src="${imgSrc}" alt="${card.id} GT" id="gt-img-${card.id}">
        </div>
        <div class="ground-truth">
          <h4>Annotated Features</h4>
          ${gtRows}
        </div>
      </div>
      <div>
        <div class="col-header"><span class="dot dot-gemma"></span> Gemma 3n E4B-IT</div>
        <div class="img-container" id="gemma-container-${card.id}" onclick="openLightbox('${card.id}', 'gemma')">
          <img src="${imgSrc}" alt="${card.id} Gemma" id="gemma-img-${card.id}">
        </div>
        <div id="gemma-results-${card.id}">
          <div class="detection-summary" style="opacity:0.5;">
            <h4>Detected Features</h4>
            <div class="no-results">Click "Analyze" to run</div>
          </div>
        </div>
      </div>
      <div>
        <div class="col-header"><span class="dot dot-gemini"></span> Gemini 3.1 Pro</div>
        <div class="img-container" id="gemini-container-${card.id}" onclick="openLightbox('${card.id}', 'gemini')">
          <img src="${imgSrc}" alt="${card.id} Gemini" id="gemini-img-${card.id}">
        </div>
        <div id="gemini-results-${card.id}">
          <div class="detection-summary" style="opacity:0.5;">
            <h4>Detected Features</h4>
            <div class="no-results">Click "Analyze" to run</div>
          </div>
        </div>
      </div>
    </div>
  </div>`;
}

const modelBoxes = {};

function extractFeatBoxes(result) {
  const boxes = [];
  const features = result.features || [];
  features.forEach(f => {
    const bb = f.bounding_box || {};
    if (bb.xmin !== undefined) {
      boxes.push({ name: f.type || 'Feature', xmin: bb.xmin, ymin: bb.ymin, xmax: bb.xmax, ymax: bb.ymax });
    }
  });
  return boxes;
}

function renderFeatResults(imageId, modelResult, containerId) {
  const el = document.getElementById(containerId);
  if (!el) return;

  if (modelResult.status === 'error') {
    el.innerHTML = `<div class="detection-summary"><h4>Detected Features</h4>
      <div class="feat-row" style="color:#f85149;">Error: ${modelResult.error}</div></div>`;
    return;
  }

  const parsed = modelResult.result || {};
  const features = parsed.features || [];

  let rows = '';
  if (features.length === 0) {
    rows = '<div class="no-results">No features detected</div>';
  } else {
    rows = features.map((f, i) => {
      const colorIdx = i % featColors.length;
      const suit = (f.suitability || 'maybe').toLowerCase();
      const suitCls = suit === 'yes' ? 'suit-yes' : suit === 'no' ? 'suit-no' : 'suit-maybe';
      const suitLabel = suit.charAt(0).toUpperCase() + suit.slice(1);
      return `<div class="feat-row">
        <div class="feat-type"><span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:${featColors[colorIdx]};margin-right:6px;vertical-align:middle;"></span>${f.type || 'Unknown'}<span class="feat-suit ${suitCls}">Van: ${suitLabel}</span></div>
        <div class="feat-desc">${f.description || ''}</div>
      </div>`;
    }).join('');
  }

  el.innerHTML = `<div class="detection-summary">
    <h4>Detected Features <span style="font-size:11px;color:#8b949e;font-weight:400;">(${features.length} found)</span></h4>
    ${rows}
  </div>`;
}

function updateModelColumn(imageId, modelName, modelData) {
  const boxes = modelData.status === 'ok' ? extractFeatBoxes(modelData.result) : [];
  modelBoxes[`${modelName}-${imageId}`] = boxes;
  drawFeatBoxes(document.getElementById(`${modelName}-container-${imageId}`), boxes);
  renderFeatResults(imageId, modelData, `${modelName}-results-${imageId}`);
}

async function analyzeImage(imageId) {
  ['gemma', 'gemini'].forEach(m => {
    document.getElementById(`${m}-results-${imageId}`).innerHTML =
      `<div class="detection-summary"><h4>Detected Features</h4><div class="feat-row" style="color:#8b949e;">Running...</div></div>`;
  });

  try {
    const resp = await fetch('/analyze-parking', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ image_id: imageId, prompt: document.getElementById('prompt-editor').value })
    });
    const data = await resp.json();
    updateModelColumn(imageId, 'gemma', data.gemma);
    updateModelColumn(imageId, 'gemini', data.gemini);
  } catch (err) {
    ['gemma', 'gemini'].forEach(m => {
      document.getElementById(`${m}-results-${imageId}`).innerHTML =
        `<div class="detection-summary"><h4>Detected Features</h4><div class="feat-row" style="color:#f85149;">Request failed: ${err.message}</div></div>`;
    });
  }
}

async function analyzeAll() {
  const btn = document.getElementById('analyze-all-btn');
  const progress = document.getElementById('analyze-progress');
  btn.classList.add('loading');
  btn.disabled = true;
  btn.querySelector('span:last-child').textContent = 'Analyzing...';
  progress.style.display = 'block';

  for (let i = 0; i < imageCards.length; i++) {
    const card = imageCards[i];
    progress.textContent = `Analyzing image ${i + 1} of ${imageCards.length}: ${card.location} ...`;
    await analyzeImage(card.id);
  }

  progress.textContent = `Done - all ${imageCards.length} images analyzed.`;
  btn.classList.remove('loading');
  btn.disabled = false;
  btn.querySelector('span:last-child').textContent = 'Re-analyze All';
}

function openLightbox(imageId, source) {
  const lb = document.getElementById('lightbox');
  const inner = document.getElementById('lightbox-inner');
  const src = `${IMAGE_BASE}/${imageId}.jpg`;

  let boxes = modelBoxes[`${source}-${imageId}`] || [];

  let boxHtml = '';
  boxes.forEach((b, i) => {
    const xmin = Math.max(0, Math.min(100, b.xmin));
    const ymin = Math.max(0, Math.min(100, b.ymin));
    const w = Math.max(0, Math.min(100, b.xmax) - xmin);
    const h = Math.max(0, Math.min(100, b.ymax) - ymin);
    if (w <= 0 || h <= 0) return;
    const colorIdx = i % featColors.length;
    boxHtml += `<div class="bbox feat-colors-${colorIdx}" style="left:${xmin}%;top:${ymin}%;width:${w}%;height:${h}%"><span class="bbox-label">${b.name || 'Feature'}</span></div>`;
  });

  inner.innerHTML = `<img src="${src}" alt="${imageId}">${boxHtml}`;
  inner.style.position = 'relative';
  inner.style.display = 'inline-block';
  lb.classList.add('active');
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('active');
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });

// Build all cards
const container = document.getElementById('cards-container');
container.innerHTML = imageCards.map(buildCard).join('');
</script>

</body>
</html>
