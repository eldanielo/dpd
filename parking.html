<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Parking - Geopost Street AI Companion</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: #0a0c10; color: #e1e4e8; }

    .home-link {
      position: absolute; top: 20px; left: 24px;
      color: #58a6ff; font-size: 13px; text-decoration: none; font-weight: 500;
    }
    .home-link:hover { text-decoration: underline; }

    .hero {
      background: linear-gradient(135deg, #1a1040 0%, #0d1117 50%, #0a1628 100%);
      border-bottom: 1px solid #30363d;
      padding: 40px 40px 36px;
      text-align: center;
      position: relative;
    }
    .hero-badge {
      display: inline-block; font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px;
      color: #d2a8ff; background: #d2a8ff15; border: 1px solid #d2a8ff30;
      padding: 4px 14px; border-radius: 20px; font-weight: 600; margin-bottom: 16px;
    }
    .hero h2 {
      font-size: 28px; font-weight: 700; letter-spacing: -0.5px;
      background: linear-gradient(135deg, #e1e4e8 0%, #d2a8ff 50%, #58a6ff 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text; margin-bottom: 10px;
    }
    .hero p { color: #8b949e; font-size: 15px; max-width: 640px; margin: 0 auto; line-height: 1.6; }

    .prompt-section { background: #161b22; border: 1px solid #30363d; border-radius: 10px; margin: 24px 40px 0; padding: 0; }
    .prompt-toggle {
      display: flex; align-items: center; justify-content: space-between; padding: 16px 20px;
      cursor: pointer; user-select: none;
    }
    .prompt-toggle h3 { font-size: 12px; text-transform: uppercase; letter-spacing: 1px; color: #8b949e; font-weight: 600; margin: 0; }
    .prompt-toggle .chevron { color: #8b949e; font-size: 14px; transition: transform 0.2s; }
    .prompt-section.collapsed .chevron { transform: rotate(-90deg); }
    .prompt-section.collapsed .prompt-inner { display: none; }
    .prompt-inner { padding: 0 20px 20px; }
    .prompt-box { background: #0d1117; border: 1px solid #30363d; border-radius: 8px; padding: 14px 16px; font-family: 'SF Mono', 'Fira Code', monospace; font-size: 13px; line-height: 1.6; color: #c9d1d9; white-space: pre-wrap; width: 100%; resize: vertical; }
    .prompt-box:focus { outline: none; border-color: #d2a8ff; box-shadow: 0 0 0 3px #d2a8ff20; }

    .cards-container { padding: 24px 40px 48px; display: flex; flex-direction: column; gap: 36px; }

    .image-card {
      background: #161b22; border: 1px solid #30363d; border-radius: 12px;
      overflow: hidden; transition: border-color 0.2s, box-shadow 0.2s;
    }
    .image-card:hover { border-color: #d2a8ff40; box-shadow: 0 4px 24px #d2a8ff08; }

    .image-card-header {
      padding: 18px 24px; border-bottom: 1px solid #30363d;
      display: flex; align-items: center; gap: 14px; flex-wrap: wrap;
      background: linear-gradient(90deg, #161b22 0%, #1a1030 100%);
    }
    .image-card-header h2 { font-size: 17px; font-weight: 600; margin-right: auto; letter-spacing: -0.2px; }

    .analyze-btn {
      background: linear-gradient(135deg, #7c3aed 0%, #a855f7 100%);
      color: #fff; border: 1px solid #a855f766; border-radius: 8px;
      padding: 8px 20px; font-size: 13px; font-weight: 600; cursor: pointer;
      display: inline-flex; align-items: center; gap: 8px;
      transition: all 0.2s; box-shadow: 0 2px 8px #7c3aed30;
    }
    .analyze-btn:hover { background: linear-gradient(135deg, #6d28d9 0%, #9333ea 100%); box-shadow: 0 4px 16px #7c3aed40; transform: translateY(-1px); }
    .analyze-btn:disabled { background: #21262d; color: #484f58; border-color: #30363d; cursor: not-allowed; box-shadow: none; transform: none; }
    .analyze-btn .spinner {
      width: 14px; height: 14px; border: 2px solid #ffffff44; border-top-color: #fff;
      border-radius: 50%; animation: spin 0.6s linear infinite; display: none;
    }
    .analyze-btn.loading .spinner { display: inline-block; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .card-layout { display: grid; grid-template-columns: 2fr 3fr; }
    .card-layout > .image-side { padding: 16px; border-right: 1px solid #30363d; }
    .card-layout > .results-side { display: flex; flex-direction: column; }
    .results-side > div { padding: 16px; }
    .results-side > div:first-child { border-bottom: 1px solid #30363d; }

    .image-preview img { width: 100%; border-radius: 6px; border: 1px solid #30363d; display: block; }

    .col-header {
      font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; color: #8b949e;
      margin-bottom: 10px; padding-bottom: 6px; border-bottom: 1px solid #30363d;
      display: flex; align-items: center; gap: 6px;
    }
    .col-header .dot { width: 8px; height: 8px; border-radius: 50%; }
    .dot-gemma { background: #58a6ff; }
    .dot-gemini { background: #d2a8ff; }

    .feat-row { padding: 6px 0; font-size: 13px; border-bottom: 1px solid #30363d22; }
    .feat-row:last-child { border-bottom: none; }
    .feat-type { font-weight: 600; color: #e1e4e8; }
    .feat-desc { color: #8b949e; font-size: 12px; margin-top: 2px; }
    .feat-suit {
      display: inline-block; font-size: 10px; padding: 1px 6px; border-radius: 3px;
      font-weight: 600; margin-left: 8px; vertical-align: middle;
    }
    .feat-suit.suit-yes { background: #23883040; color: #3fb950; border: 1px solid #23883060; }
    .feat-suit.suit-no { background: #da363330; color: #f85149; border: 1px solid #da363360; }
    .feat-suit.suit-maybe { background: #d29a2840; color: #d29922; border: 1px solid #d29a2860; }

    .detection-summary { background: #0d1117; border: 1px solid #30363d; border-radius: 6px; padding: 12px; }
    .detection-summary h4 { font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; color: #8b949e; margin-bottom: 8px; }

    .no-results { color: #484f58; font-style: italic; font-size: 13px; padding: 8px 0; }

    .assessment-banner { border-radius: 6px; padding: 14px 16px; margin-bottom: 12px; }
    .assessment-banner.assess-yes { background: #23883020; border: 1px solid #23883060; }
    .assessment-banner.assess-no { background: #da363320; border: 1px solid #da363360; }
    .assessment-banner.assess-caution { background: #d29a2820; border: 1px solid #d29a2860; }
    .assess-verdict { font-size: 16px; font-weight: 700; margin-bottom: 6px; display: flex; align-items: center; gap: 8px; }
    .assess-verdict.v-yes { color: #3fb950; }
    .assess-verdict.v-no { color: #f85149; }
    .assess-verdict.v-caution { color: #d29922; }
    .assess-reason { font-size: 13px; color: #c9d1d9; margin-bottom: 8px; line-height: 1.5; }
    .assess-action { font-size: 12px; color: #58a6ff; font-weight: 600; margin-bottom: 4px; }
    .assess-time { font-size: 12px; color: #8b949e; font-style: italic; }
    .assess-confidence { font-size: 10px; padding: 1px 6px; border-radius: 3px; font-weight: 600; background: #30363d; color: #8b949e; border: 1px solid #30363d; vertical-align: middle; }

    .lightbox { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000000ee; z-index: 1000; justify-content: center; align-items: center; cursor: zoom-out; }
    .lightbox.active { display: flex; }
    .lightbox-inner { position: relative; max-width: 95vw; max-height: 95vh; }
    .lightbox-inner img { max-width: 95vw; max-height: 95vh; border-radius: 8px; }
    .lightbox-close { position: fixed; top: 20px; right: 30px; color: #fff; font-size: 32px; cursor: pointer; z-index: 1001; }

    @media (max-width: 900px) {
      .card-layout { grid-template-columns: 1fr; }
      .card-layout > .image-side { border-right: none; border-bottom: 1px solid #30363d; }
    }
  </style>
</head>
<body>

<div class="hero">
  <a href="/" class="home-link">&larr; Home</a>
  <div class="hero-badge">Powered by Gemini Vision</div>
  <h2>Smart Parking Analysis</h2>
  <p>AI analyzes street-level images to detect parking signs, loading zones, and restrictions in real-time, telling drivers if they can legally stop right now.</p>
  <div style="position:absolute;top:20px;right:24px;text-align:right;">
    <button class="analyze-btn" id="analyze-all-btn" onclick="analyzeAll()">
      <span class="spinner"></span>
      <span>Analyze All Images</span>
    </button>
    <div id="analyze-progress" style="margin-top:6px;font-size:13px;color:#8b949e;display:none;"></div>
  </div>
  <div id="live-clock" style="margin-top:6px;font-size:13px;color:#58a6ff;font-family:monospace;"></div>
</div>

<div class="prompt-section collapsed" id="prompt-section">
  <div class="prompt-toggle" onclick="document.getElementById('prompt-section').classList.toggle('collapsed')">
    <h3>Prompt (same for all models)</h3>
    <span class="chevron">&#9660;</span>
  </div>
  <div class="prompt-inner">
  <textarea class="prompt-box" id="prompt-editor" rows="14">You are a parking and loading zone detection AI analyzing street-level images of European cities for DPD delivery drivers. The current date/time is {{DATETIME}} ({{DAY_OF_WEEK}}).

Identify all parking-related features visible in the image. For each feature found, provide:
- type: the type of feature (e.g. "loading_zone", "no_parking_sign", "parking_meter", "restricted_parking", "available_spot", "disabled_parking", "time_limited_parking", "blue_zone")
- description: brief description of what you see
- suitability: whether this spot/zone is suitable for a DPD delivery van right now ("yes", "no", "maybe")

Then provide an overall parking assessment:
- can_park: "yes", "no", or "caution" — can a DPD delivery van legally stop/park here RIGHT NOW given the current day and time?
- confidence: "high", "medium", or "low"
- reason: one sentence explaining your verdict, referencing specific signs/rules and the current time
- recommended_action: practical advice for the driver (e.g. "Use loading bay for max 20 min", "Double-park with hazards briefly", "Find alternative — no legal option here")
- time_sensitive_notes: any upcoming time window changes the driver should know about (e.g. "Restriction ends at 18:00, 2 hours from now")

Return ONLY a JSON object with a "features" array AND an "assessment" object containing can_park, confidence, reason, recommended_action, and time_sensitive_notes.</textarea>
  </div>
</div>

<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <span class="lightbox-close">&times;</span>
  <div class="lightbox-inner" id="lightbox-inner"></div>
</div>

<div class="cards-container" id="cards-container"></div>

<script>
const IMAGE_BASE = 'https://storage.googleapis.com/dpd-street-detection/parking';

const imageCards = [
  { id: "berlin_loading_zone", location: "Berlin Neukölln (DE) — Ladezone / Loading Zone with Delivery Icon" },
  { id: "france_no_parking_sauf_taxis", location: "Cusset (FR) — Stationnement Interdit Sauf Taxis (No Parking Except Taxis)" },
  { id: "winschoten_parking_rules", location: "Winschoten (NL) — Local Parking Rules with Time Windows & Disc Zone" },
  { id: "berlin_schoeneberger", location: "Berlin Schöneberg (DE) — Multiple Overlapping Signs: No-Stop + Time Panels" },
  { id: "italy_24h_ban", location: "Italy — 24h Parking Ban with Directional Arrows & Zone Signage" },
  { id: "netherlands_blue_disc", location: "Netherlands — Blue Disc Zone Markings with Time-Limited Parking" },
  { id: "fribourg_yellow_cross", location: "Fribourg, Yellow Cross Parking Prohibition (CH)" }
];

function buildCard(card) {
  const imgSrc = `${IMAGE_BASE}/${card.id}.jpg`;
  return `
  <div class="image-card" id="card-${card.id}">
    <div class="image-card-header">
      <h2>${card.location}</h2>
      <button class="analyze-btn" id="btn-${card.id}" onclick="analyzeSingle('${card.id}')">
        <span class="spinner"></span>
        <span>Analyze</span>
      </button>
    </div>
    <div class="card-layout">
      <div class="image-side">
        <div class="image-preview">
          <img src="${imgSrc}" alt="${card.location}" onclick="openLightbox('${card.id}')">
        </div>
      </div>
      <div class="results-side">
        <div>
          <div class="col-header"><span class="dot dot-gemma"></span> Gemma 3n E4B-IT</div>
          <div id="gemma-results-${card.id}">
            <div class="detection-summary" style="opacity:0.5;">
              <h4>Detected Features</h4>
              <div class="no-results">Click "Analyze" to run</div>
            </div>
          </div>
        </div>
        <div>
          <div class="col-header"><span class="dot dot-gemini"></span> Gemini 3.1 Pro</div>
          <div id="gemini-results-${card.id}">
            <div class="detection-summary" style="opacity:0.5;">
              <h4>Detected Features</h4>
              <div class="no-results">Click "Analyze" to run</div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>`;
}

function renderAssessment(a) {
  if (!a) return '';
  const cp = (a.can_park || 'caution').toLowerCase();
  const bannerCls = cp === 'yes' ? 'assess-yes' : cp === 'no' ? 'assess-no' : 'assess-caution';
  const verdictCls = cp === 'yes' ? 'v-yes' : cp === 'no' ? 'v-no' : 'v-caution';
  const icon = cp === 'yes' ? 'P' : cp === 'no' ? '\u2718' : '\u26A0';
  const label = cp === 'yes' ? 'PARK HERE — OK' : cp === 'no' ? 'DO NOT PARK' : 'CAUTION';
  const conf = (a.confidence || 'medium').toLowerCase();
  return `<div class="assessment-banner ${bannerCls}">
    <div class="assess-verdict ${verdictCls}">${icon} ${label} <span class="assess-confidence">${conf} confidence</span></div>
    <div class="assess-reason">${a.reason || ''}</div>
    ${a.recommended_action ? `<div class="assess-action">\u27A4 ${a.recommended_action}</div>` : ''}
    ${a.time_sensitive_notes ? `<div class="assess-time">\u23F0 ${a.time_sensitive_notes}</div>` : ''}
  </div>`;
}

function renderResults(imageId, modelResult, containerId) {
  const el = document.getElementById(containerId);
  if (!el) return;

  if (modelResult.status === 'error') {
    el.innerHTML = `<div class="detection-summary"><h4>Detected Features</h4>
      <div class="feat-row" style="color:#f85149;">Error: ${modelResult.error}</div></div>`;
    return;
  }

  const parsed = modelResult.result || {};
  const features = parsed.features || [];
  const assessment = parsed.assessment || null;

  let assessHtml = renderAssessment(assessment);

  let rows = '';
  if (features.length === 0) {
    rows = '<div class="no-results">No features detected</div>';
  } else {
    rows = features.map(f => {
      const suit = (f.suitability || 'maybe').toLowerCase();
      const suitCls = suit === 'yes' ? 'suit-yes' : suit === 'no' ? 'suit-no' : 'suit-maybe';
      const suitLabel = suit.charAt(0).toUpperCase() + suit.slice(1);
      return `<div class="feat-row">
        <div class="feat-type">${f.type || 'Unknown'}<span class="feat-suit ${suitCls}">Van: ${suitLabel}</span></div>
        <div class="feat-desc">${f.description || ''}</div>
      </div>`;
    }).join('');
  }

  el.innerHTML = `${assessHtml}<div class="detection-summary">
    <h4>Detected Features <span style="font-size:11px;color:#8b949e;font-weight:400;">(${features.length} found)</span></h4>
    ${rows}
  </div>`;
}

function getPromptWithDatetime() {
  const now = new Date();
  const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const dt = now.toLocaleString('en-GB', { year:'numeric', month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit', hour12:false });
  const dow = days[now.getDay()];
  let prompt = document.getElementById('prompt-editor').value;
  prompt = prompt.replace('{{DATETIME}}', dt).replace('{{DAY_OF_WEEK}}', dow);
  return prompt;
}

async function analyzeImage(imageId) {
  ['gemma', 'gemini'].forEach(m => {
    document.getElementById(`${m}-results-${imageId}`).innerHTML =
      `<div class="detection-summary"><h4>Detected Features</h4><div class="feat-row" style="color:#8b949e;">Running...</div></div>`;
  });

  try {
    const resp = await fetch('/analyze-parking', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ image_id: imageId, prompt: getPromptWithDatetime() })
    });
    const data = await resp.json();
    renderResults(imageId, data.gemma, `gemma-results-${imageId}`);
    renderResults(imageId, data.gemini, `gemini-results-${imageId}`);
    saveResult('parking', imageId, data);
  } catch (err) {
    ['gemma', 'gemini'].forEach(m => {
      document.getElementById(`${m}-results-${imageId}`).innerHTML =
        `<div class="detection-summary"><h4>Detected Features</h4><div class="feat-row" style="color:#f85149;">Request failed: ${err.message}</div></div>`;
    });
  }
}

async function analyzeSingle(imageId) {
  const btn = document.getElementById(`btn-${imageId}`);
  btn.classList.add('loading');
  btn.disabled = true;
  btn.querySelector('span:last-child').textContent = 'Analyzing...';
  await analyzeImage(imageId);
  btn.classList.remove('loading');
  btn.disabled = false;
  btn.querySelector('span:last-child').textContent = 'Re-analyze';
}

async function analyzeAll() {
  const btn = document.getElementById('analyze-all-btn');
  const progress = document.getElementById('analyze-progress');
  btn.classList.add('loading');
  btn.disabled = true;
  btn.querySelector('span:last-child').textContent = 'Analyzing...';
  progress.style.display = 'block';

  for (let i = 0; i < imageCards.length; i++) {
    const card = imageCards[i];
    progress.textContent = `Analyzing image ${i + 1} of ${imageCards.length}: ${card.location} ...`;
    await analyzeImage(card.id);
  }

  progress.textContent = `Done - all ${imageCards.length} images analyzed.`;
  btn.classList.remove('loading');
  btn.disabled = false;
  btn.querySelector('span:last-child').textContent = 'Re-analyze All';
}

function openLightbox(imageId) {
  const lb = document.getElementById('lightbox');
  const inner = document.getElementById('lightbox-inner');
  inner.innerHTML = `<img src="${IMAGE_BASE}/${imageId}.jpg" alt="${imageId}">`;
  lb.classList.add('active');
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('active');
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });

function saveResult(page, imageId, data) {
  try {
    const cache = JSON.parse(localStorage.getItem('dpd-cache') || '{}');
    if (!cache[page]) cache[page] = {};
    cache[page][imageId] = data;
    localStorage.setItem('dpd-cache', JSON.stringify(cache));
  } catch (e) {}
}

function loadResults(page) {
  try {
    const cache = JSON.parse(localStorage.getItem('dpd-cache') || '{}');
    return cache[page] || {};
  } catch (e) { return {}; }
}

const container = document.getElementById('cards-container');
container.innerHTML = imageCards.map(buildCard).join('');

// Live clock
function updateClock() {
  const now = new Date();
  const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const dt = now.toLocaleString('en-GB', { year:'numeric', month:'short', day:'numeric', hour:'2-digit', minute:'2-digit', second:'2-digit', hour12:false });
  document.getElementById('live-clock').textContent = `Assessment context: ${days[now.getDay()]}, ${dt} (local time)`;
}
updateClock();
setInterval(updateClock, 1000);

// Restore cached results
const cached = loadResults('parking');
Object.keys(cached).forEach(imageId => {
  const data = cached[imageId];
  if (data.gemma) renderResults(imageId, data.gemma, `gemma-results-${imageId}`);
  if (data.gemini) renderResults(imageId, data.gemini, `gemini-results-${imageId}`);
});
</script>

</body>
</html>
