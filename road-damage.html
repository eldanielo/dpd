const codeColors = { D00:'#58a6ff', D10:'#d2a8ff', D20:'#f0883e', D40:'#f85149' };

function drawBoxes(container, boxes) {
  if (!container) return;
  container.querySelectorAll('.bbox').forEach(b => b.remove());
  boxes.forEach(b => {
    // Clamp to valid range
    const xmin = Math.max(0, Math.min(100, b.xmin));
    const ymin = Math.max(0, Math.min(100, b.ymin));
    const xmax = Math.max(0, Math.min(100, b.xmax));
    const ymax = Math.max(0, Math.min(100, b.ymax));
    const w = xmax - xmin;
    const h = ymax - ymin;
    if (w <= 0 || h <= 0) return; // Skip invalid boxes
    const div = document.createElement('div');
    div.className = `bbox bbox-${b.code}`;
    div.style.left = xmin + '%';
    div.style.top = ymin + '%';
    div.style.width = w + '%';
    div.style.height = h + '%';
    div.innerHTML = `<span class="bbox-label">${b.code}</span>`;
    container.appendChild(div);
  });
}

// Compute score: how many GT defect types did the model detect?
function computeScore(imageId, modelResult) {
  const card = imageCards.find(c => c.id === imageId);
  if (!card) return null;

  // GT counts per code
  const gtCodes = {};
  (card.gtSummary || []).forEach(g => { gtCodes[g.code] = g.count; });
  const gtTotal = card.gtCount;

  if (gtTotal === 0) {
    // Clean road: score is based on false positives
    const defects = (modelResult.defects || []).filter(d => (d.count || 0) > 0);
    if (defects.length === 0) return { correct: 0, total: 0, fp: 0, label: 'Correct (clean road)', cls: 'score-good' };
    const fpCount = defects.reduce((sum, d) => sum + (d.count || 1), 0);
    return { correct: 0, total: 0, fp: fpCount, label: `${fpCount} false positive${fpCount > 1 ? 's' : ''}`, cls: 'score-bad' };
  }

  // For each GT code, check if model detected it
  const modelCodes = {};
  (modelResult.defects || []).forEach(d => {
    const code = d.defect_code || d.code || '';
    const count = d.count || (d.bounding_boxes || []).length || 1;
    if (count > 0) modelCodes[code] = (modelCodes[code] || 0) + count;
  });

  let correct = 0;
  const gtCodeList = Object.keys(gtCodes);
  gtCodeList.forEach(code => {
    if (modelCodes[code]) correct++;
  });

  // False positives: codes model detected but not in GT
  const fpCodes = Object.keys(modelCodes).filter(c => !gtCodes[c]);

  const total = gtCodeList.length;
  const pct = total > 0 ? correct / total : 1;
  const cls = pct >= 0.8 ? 'score-good' : pct >= 0.5 ? 'score-warn' : 'score-bad';
  let label = `${correct}/${total} defect types detected`;
  if (fpCodes.length > 0) label += ` + ${fpCodes.length} false`;

  return { correct, total, fp: fpCodes.length, label, cls };
}

// Store model boxes for lightbox
const modelBoxes = {};

function extractBoxesFromResult(result) {
  const boxes = [];
  const defects = result.defects || result.road_surface_defects || [];
  defects.forEach(d => {
    const code = d.defect_code || d.code || '';
    const count = d.count || 0;
    if (count === 0 && !(d.bounding_boxes || d.boxes || []).length) return;
    const bboxes = d.bounding_boxes || d.boxes || [];
    bboxes.forEach(bb => {
      if (bb.xmin !== undefined) {
        boxes.push({ code, xmin: bb.xmin, ymin: bb.ymin, xmax: bb.xmax, ymax: bb.ymax });
      }
    });
  });
  return boxes;
}

function renderDefectResults(imageId, modelResult, containerId) {
  const el = document.getElementById(containerId);
  if (!el) return;

  if (modelResult.status === 'error') {
    el.innerHTML = `<div class="detection-summary"><h4>Model Detections</h4>
      <div class="gt-row" style="color:#f85149;">Error: ${modelResult.error}</div></div>`;
    return;
  }

  const card = imageCards.find(c => c.id === imageId);
  const parsed = modelResult.result || {};
  const defects = (parsed.defects || parsed.road_surface_defects || [])
    .filter(d => (d.count || 0) > 0 || (d.bounding_boxes || []).length > 0);

  // Build GT lookup
  const gtCodes = {};
  if (card) card.gtSummary.forEach(g => { gtCodes[g.code] = g.count; });

  // Score
  const score = computeScore(imageId, parsed);
  const scoreHtml = score ? `<span class="score-badge ${score.cls}">${score.label}</span>` : '';

  let rows = '';

  if (defects.length === 0 && card && card.gtCount === 0) {
    rows = '<div class="gt-row" style="color:#3fb950;">No defects detected - Correct!</div>';
  } else if (defects.length === 0) {
    rows = '<div class="gt-row" style="color:#484f58; font-style:italic;">No defects detected</div>';
  } else {
    rows = defects.map(d => {
      const code = d.defect_code || d.code || '??';
      const label = codeLabels[code] || code;
      const count = d.count || (d.bounding_boxes || []).length || 1;
      const bboxCount = (d.bounding_boxes || d.boxes || []).length;
      const isFP = card && card.gtCount >= 0 && !gtCodes[code];
      const gtCount = gtCodes[code];

      let compareHtml = '';
      if (isFP) {
        compareHtml = '<span class="fp-tag">FALSE POSITIVE</span>';
      } else if (gtCount !== undefined) {
        if (count === gtCount) compareHtml = '<span class="correct-tag">Correct!</span>';
        else if (count > gtCount) compareHtml = `<span class="count-compare count-over">(GT: ${gtCount})</span>`;
        else compareHtml = `<span class="count-compare count-under">(GT: ${gtCount})</span>`;
      }

      return `<div class="gt-row">
        <span class="gt-code">${code}</span> ${label}
        <span class="gt-count">x${count}${bboxCount ? ' (' + bboxCount + ' box' + (bboxCount > 1 ? 'es' : '') + ')' : ''}</span>
        ${compareHtml}
      </div>`;
    }).join('');
  }

  // Show missed GT codes
  if (card) {
    const detectedCodes = new Set(defects.map(d => d.defect_code || d.code));
    card.gtSummary.forEach(g => {
      if (!detectedCodes.has(g.code)) {
        rows += `<div class="gt-row missed-tag">${g.code} ${g.label} <span class="gt-count">MISSED (GT: x${g.count})</span></div>`;
      }
    });
  }

  // Build legend from detected codes
  const detectedCodesArr = [...new Set(defects.map(d => d.defect_code || d.code).filter(c => codeColors[c]))];
  const legendHtml = detectedCodesArr.length > 0 ?
    `<div class="legend">${detectedCodesArr.map(c => `<div class="legend-item"><span class="legend-swatch" style="background:${codeColors[c]}"></span>${c}</div>`).join('')}</div>` : '';

  el.innerHTML = `<div class="detection-summary">
    <h4>Model Detections ${scoreHtml}</h4>
    ${rows}
    ${legendHtml}
  </div>`;
}

function updateModelColumn(imageId, modelName, modelData) {
  const boxes = modelData.status === 'ok' ? extractBoxesFromResult(modelData.result) : [];
  modelBoxes[`${modelName}-${imageId}`] = boxes;
  drawBoxes(document.getElementById(`${modelName}-container-${imageId}`), boxes);
  renderDefectResults(imageId, modelData, `${modelName}-results-${imageId}`);
}

async function analyzeImage(imageId) {
  // Show loading state
  ['gemma', 'gemini'].forEach(m => {
    document.getElementById(`${m}-results-${imageId}`).innerHTML =
      `<div class="detection-summary"><h4>Model Detections</h4><div class="gt-row" style="color:#8b949e;">Running...</div></div>`;
  });

  try {
    const resp = await fetch('/analyze', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ image_id: imageId, prompt: document.getElementById('prompt-editor').value })
    });
    const data = await resp.json();
    updateModelColumn(imageId, 'gemma', data.gemma);
    updateModelColumn(imageId, 'gemini', data.gemini);
    saveResult('road-damage', imageId, data);
  } catch (err) {
    ['gemma', 'gemini'].forEach(m => {
      document.getElementById(`${m}-results-${imageId}`).innerHTML =
        `<div class="detection-summary"><h4>Model Detections</h4><div class="gt-row" style="color:#f85149;">Request failed: ${err.message}</div></div>`;
    });
  }
}

async function analyzeAll() {
  const btn = document.getElementById('analyze-all-btn');
  const progress = document.getElementById('analyze-progress');
  btn.classList.add('loading');
  btn.disabled = true;
  btn.querySelector('span:last-child').textContent = 'Analyzing...';
  progress.style.display = 'block';

  for (let i = 0; i < imageCards.length; i++) {
    const card = imageCards[i];
    progress.textContent = `Analyzing image ${i + 1} of ${imageCards.length}: ${card.id}.jpg ...`;
    await analyzeImage(card.id);
  }

  progress.textContent = `Done - all ${imageCards.length} images analyzed.`;
  btn.classList.remove('loading');
  btn.disabled = false;
  btn.querySelector('span:last-child').textContent = 'Re-analyze All';
}

function openLightbox(imageId, source) {
  const lb = document.getElementById('lightbox');
  const inner = document.getElementById('lightbox-inner');
  const src = `${IMAGE_BASE}/${imageId}.jpg`;

  let boxes = [];
  if (source === 'gt') {
    boxes = gtBoxes[imageId] || [];
  } else {
    boxes = modelBoxes[`${source}-${imageId}`] || [];
  }

  let boxHtml = '';
  boxes.forEach(b => {
    const xmin = Math.max(0, Math.min(100, b.xmin));
    const ymin = Math.max(0, Math.min(100, b.ymin));
    const w = Math.max(0, Math.min(100, b.xmax) - xmin);
    const h = Math.max(0, Math.min(100, b.ymax) - ymin);
    if (w <= 0 || h <= 0) return;
    boxHtml += `<div class="bbox bbox-${b.code}" style="left:${xmin}%;top:${ymin}%;width:${w}%;height:${h}%"><span class="bbox-label">${b.code}</span></div>`;
  });

  inner.innerHTML = `<img src="${src}" alt="${imageId}">${boxHtml}`;
  inner.style.position = 'relative';
  inner.style.display = 'inline-block';
  lb.classList.add('active');
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('active');
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });

function saveResult(page, imageId, data) {
  try {
    const cache = JSON.parse(localStorage.getItem('dpd-cache') || '{}');
    if (!cache[page]) cache[page] = {};
    cache[page][imageId] = data;
    localStorage.setItem('dpd-cache', JSON.stringify(cache));
  } catch (e) {}
}

function loadResults(page) {
  try {
    const cache = JSON.parse(localStorage.getItem('dpd-cache') || '{}');
    return cache[page] || {};
  } catch (e) { return {}; }
}

// Build all cards
const container = document.getElementById('cards-container');
container.innerHTML = imageCards.map(buildCard).join('');

// Draw GT boxes once images load
imageCards.forEach(card => {
  const gtContainer = document.getElementById(`gt-container-${card.id}`);
  const gtImg = document.getElementById(`gt-img-${card.id}`);
  const drawGt = () => drawBoxes(gtContainer, gtBoxes[card.id] || []);
  if (gtImg.complete) drawGt(); else gtImg.onload = drawGt;
});

// Restore cached results
const cached = loadResults('road-damage');
Object.keys(cached).forEach(imageId => {
  const data = cached[imageId];
  if (data.gemma) updateModelColumn(imageId, 'gemma', data.gemma);
  if (data.gemini) updateModelColumn(imageId, 'gemini', data.gemini);
});
</script>
