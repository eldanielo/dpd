<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Traffic - DPD AI Road Companion</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: #0f1117; color: #e1e4e8; }

    header { background: #161b22; border-bottom: 1px solid #30363d; padding: 20px 40px; }
    header h1 { font-size: 22px; font-weight: 600; }
    header p { color: #8b949e; margin-top: 4px; font-size: 14px; }

    .nav-links { margin-top: 8px; }
    .nav-links a { color: #58a6ff; font-size: 13px; text-decoration: none; }
    .nav-links a:hover { text-decoration: underline; }

    .prompt-section { background: #161b22; border: 1px solid #30363d; border-radius: 8px; margin: 24px 40px 0; padding: 20px; }
    .prompt-section h3 { font-size: 13px; text-transform: uppercase; letter-spacing: 0.5px; color: #8b949e; margin-bottom: 10px; }
    .prompt-box { background: #0d1117; border: 1px solid #30363d; border-radius: 6px; padding: 14px 16px; font-family: 'SF Mono', 'Fira Code', monospace; font-size: 13px; line-height: 1.6; color: #c9d1d9; white-space: pre-wrap; width: 100%; resize: vertical; }
    .prompt-box:focus { outline: none; border-color: #58a6ff; }

    .cards-container { padding: 24px 40px; display: flex; flex-direction: column; gap: 32px; }

    .image-card { background: #161b22; border: 1px solid #30363d; border-radius: 10px; overflow: hidden; }
    .image-card-header { padding: 16px 20px; border-bottom: 1px solid #30363d; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
    .image-card-header h2 { font-size: 16px; font-weight: 600; margin-right: auto; }

    .analyze-btn {
      background: #238636; color: #fff; border: 1px solid #2ea04366; border-radius: 6px;
      padding: 6px 16px; font-size: 13px; font-weight: 600; cursor: pointer;
      display: inline-flex; align-items: center; gap: 6px; transition: background 0.15s;
    }
    .analyze-btn:hover { background: #2ea043; }
    .analyze-btn:disabled { background: #21262d; color: #484f58; border-color: #30363d; cursor: not-allowed; }
    .analyze-btn .spinner {
      width: 14px; height: 14px; border: 2px solid #ffffff44; border-top-color: #fff;
      border-radius: 50%; animation: spin 0.6s linear infinite; display: none;
    }
    .analyze-btn.loading .spinner { display: inline-block; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .image-preview { padding: 16px; border-bottom: 1px solid #30363d; }
    .image-preview img { width: 100%; max-width: 640px; border-radius: 6px; border: 1px solid #30363d; display: block; }

    .two-col { display: grid; grid-template-columns: 1fr 1fr; }
    .two-col > div { padding: 16px; border-right: 1px solid #30363d; }
    .two-col > div:last-child { border-right: none; }

    .col-header {
      font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; color: #8b949e;
      margin-bottom: 10px; padding-bottom: 6px; border-bottom: 1px solid #30363d;
      display: flex; align-items: center; gap: 6px;
    }
    .col-header .dot { width: 8px; height: 8px; border-radius: 50%; }
    .dot-gemma { background: #58a6ff; }
    .dot-gemini { background: #d2a8ff; }

    .restr-row { padding: 6px 0; font-size: 13px; border-bottom: 1px solid #30363d22; }
    .restr-row:last-child { border-bottom: none; }
    .restr-type { font-weight: 600; color: #e1e4e8; }
    .restr-desc { color: #8b949e; font-size: 12px; margin-top: 2px; }
    .restr-impact {
      display: inline-block; font-size: 10px; padding: 1px 6px; border-radius: 3px;
      font-weight: 600; margin-left: 8px; vertical-align: middle;
    }
    .restr-impact.impact-high { background: #da363330; color: #f85149; border: 1px solid #da363360; }
    .restr-impact.impact-medium { background: #d29a2840; color: #d29922; border: 1px solid #d29a2860; }
    .restr-impact.impact-low { background: #23883040; color: #3fb950; border: 1px solid #23883060; }
    .restr-impact.impact-none { background: #30363d; color: #8b949e; border: 1px solid #30363d; }

    .detection-summary { background: #0d1117; border: 1px solid #30363d; border-radius: 6px; padding: 12px; }
    .detection-summary h4 { font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; color: #8b949e; margin-bottom: 8px; }

    .no-results { color: #484f58; font-style: italic; font-size: 13px; padding: 8px 0; }

    .lightbox { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000000ee; z-index: 1000; justify-content: center; align-items: center; cursor: zoom-out; }
    .lightbox.active { display: flex; }
    .lightbox-inner { position: relative; max-width: 95vw; max-height: 95vh; }
    .lightbox-inner img { max-width: 95vw; max-height: 95vh; border-radius: 8px; }
    .lightbox-close { position: fixed; top: 20px; right: 30px; color: #fff; font-size: 32px; cursor: pointer; z-index: 1001; }

    @media (max-width: 900px) {
      .two-col { grid-template-columns: 1fr; }
      .two-col > div { border-right: none; border-bottom: 1px solid #30363d; }
      .two-col > div:last-child { border-bottom: none; }
    }
  </style>
</head>
<body>

<header>
  <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;">
    <div>
      <h1>DPD AI Road Companion <span style="font-weight:400;color:#8b949e;">/ Traffic</span></h1>
      <p>Gemma 3n E4B-IT | Gemini 3.1 Pro &mdash; European Traffic Restriction Analysis | DPD AI Road Companion</p>
      <div class="nav-links"><a href="/">&larr; Home</a> &nbsp;|&nbsp; <a href="/road-damage">Road Damage</a> &nbsp;|&nbsp; <a href="/shop-hours">Shop Hours</a> &nbsp;|&nbsp; <a href="/parking">Parking</a> &nbsp;|&nbsp; <a href="/addresses">Addresses</a> &nbsp;|&nbsp; <strong>Traffic</strong> &nbsp;|&nbsp; <a href="/delivery">AR Delivery</a></div>
    </div>
    <button class="analyze-btn" id="analyze-all-btn" onclick="analyzeAll()">
      <span class="spinner"></span>
      <span>Analyze All Images</span>
    </button>
  </div>
  <div id="analyze-progress" style="margin-top:8px;font-size:13px;color:#8b949e;display:none;"></div>
</header>

<div class="prompt-section">
  <h3>Prompt (same for all models)</h3>
  <textarea class="prompt-box" id="prompt-editor" rows="10">You are a traffic restriction detection AI analyzing street-level images of European cities. Identify all traffic signs, restrictions, and regulations visible in the image that could affect a delivery van.

For each restriction found, provide:
- type: the type of restriction (e.g. "weight_limit", "height_limit", "no_entry", "one_way", "pedestrian_zone", "ZTL", "time_restriction", "speed_limit", "no_trucks", "low_emission_zone")
- description: brief description of what the sign/restriction indicates
- impact: impact on a standard DPD delivery van ("high", "medium", "low", "none")

Return ONLY a JSON object with a "restrictions" array. Each element must include type, description, and impact.</textarea>
</div>

<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <span class="lightbox-close">&times;</span>
  <div class="lightbox-inner" id="lightbox-inner"></div>
</div>

<div class="cards-container" id="cards-container"></div>

<script>
const IMAGE_BASE = 'https://storage.googleapis.com/dpd-street-detection/traffic';

const imageCards = [
  { id: "paris_montmartre", location: "Paris, Rue de Rennes" },
  { id: "london_city", location: "London, Ludgate Hill" },
  { id: "munich_altstadt", location: "Munich, Altstadt" },
  { id: "prague_oldtown", location: "Prague, Old Town" },
  { id: "rome_trastevere", location: "Rome, Trastevere" },
  { id: "barcelona_gothic", location: "Florence, Centro Storico" }
];

function buildCard(card) {
  const imgSrc = `${IMAGE_BASE}/${card.id}.jpg`;
  return `
  <div class="image-card" id="card-${card.id}">
    <div class="image-card-header">
      <h2>${card.location}</h2>
    </div>
    <div class="image-preview">
      <img src="${imgSrc}" alt="${card.location}" onclick="openLightbox('${card.id}')">
    </div>
    <div class="two-col">
      <div>
        <div class="col-header"><span class="dot dot-gemma"></span> Gemma 3n E4B-IT</div>
        <div id="gemma-results-${card.id}">
          <div class="detection-summary" style="opacity:0.5;">
            <h4>Detected Restrictions</h4>
            <div class="no-results">Click "Analyze" to run</div>
          </div>
        </div>
      </div>
      <div>
        <div class="col-header"><span class="dot dot-gemini"></span> Gemini 3.1 Pro</div>
        <div id="gemini-results-${card.id}">
          <div class="detection-summary" style="opacity:0.5;">
            <h4>Detected Restrictions</h4>
            <div class="no-results">Click "Analyze" to run</div>
          </div>
        </div>
      </div>
    </div>
  </div>`;
}

function renderResults(imageId, modelResult, containerId) {
  const el = document.getElementById(containerId);
  if (!el) return;

  if (modelResult.status === 'error') {
    el.innerHTML = `<div class="detection-summary"><h4>Detected Restrictions</h4>
      <div class="restr-row" style="color:#f85149;">Error: ${modelResult.error}</div></div>`;
    return;
  }

  const parsed = modelResult.result || {};
  const restrictions = parsed.restrictions || [];

  let rows = '';
  if (restrictions.length === 0) {
    rows = '<div class="no-results">No restrictions detected</div>';
  } else {
    rows = restrictions.map(r => {
      const impact = (r.impact || 'none').toLowerCase();
      const impactCls = impact === 'high' ? 'impact-high' : impact === 'medium' ? 'impact-medium' : impact === 'low' ? 'impact-low' : 'impact-none';
      const impactLabel = impact.charAt(0).toUpperCase() + impact.slice(1);
      return `<div class="restr-row">
        <div class="restr-type">${r.type || 'Unknown'}<span class="restr-impact ${impactCls}">Impact: ${impactLabel}</span></div>
        <div class="restr-desc">${r.description || ''}</div>
      </div>`;
    }).join('');
  }

  el.innerHTML = `<div class="detection-summary">
    <h4>Detected Restrictions <span style="font-size:11px;color:#8b949e;font-weight:400;">(${restrictions.length} found)</span></h4>
    ${rows}
  </div>`;
}

async function analyzeImage(imageId) {
  ['gemma', 'gemini'].forEach(m => {
    document.getElementById(`${m}-results-${imageId}`).innerHTML =
      `<div class="detection-summary"><h4>Detected Restrictions</h4><div class="restr-row" style="color:#8b949e;">Running...</div></div>`;
  });

  try {
    const resp = await fetch('/analyze-traffic', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ image_id: imageId, prompt: document.getElementById('prompt-editor').value })
    });
    const data = await resp.json();
    renderResults(imageId, data.gemma, `gemma-results-${imageId}`);
    renderResults(imageId, data.gemini, `gemini-results-${imageId}`);
    saveResult('traffic', imageId, data);
  } catch (err) {
    ['gemma', 'gemini'].forEach(m => {
      document.getElementById(`${m}-results-${imageId}`).innerHTML =
        `<div class="detection-summary"><h4>Detected Restrictions</h4><div class="restr-row" style="color:#f85149;">Request failed: ${err.message}</div></div>`;
    });
  }
}

async function analyzeAll() {
  const btn = document.getElementById('analyze-all-btn');
  const progress = document.getElementById('analyze-progress');
  btn.classList.add('loading');
  btn.disabled = true;
  btn.querySelector('span:last-child').textContent = 'Analyzing...';
  progress.style.display = 'block';

  for (let i = 0; i < imageCards.length; i++) {
    const card = imageCards[i];
    progress.textContent = `Analyzing image ${i + 1} of ${imageCards.length}: ${card.location} ...`;
    await analyzeImage(card.id);
  }

  progress.textContent = `Done - all ${imageCards.length} images analyzed.`;
  btn.classList.remove('loading');
  btn.disabled = false;
  btn.querySelector('span:last-child').textContent = 'Re-analyze All';
}

function openLightbox(imageId) {
  const lb = document.getElementById('lightbox');
  const inner = document.getElementById('lightbox-inner');
  inner.innerHTML = `<img src="${IMAGE_BASE}/${imageId}.jpg" alt="${imageId}">`;
  lb.classList.add('active');
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('active');
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });

function saveResult(page, imageId, data) {
  try {
    const cache = JSON.parse(localStorage.getItem('dpd-cache') || '{}');
    if (!cache[page]) cache[page] = {};
    cache[page][imageId] = data;
    localStorage.setItem('dpd-cache', JSON.stringify(cache));
  } catch (e) {}
}

function loadResults(page) {
  try {
    const cache = JSON.parse(localStorage.getItem('dpd-cache') || '{}');
    return cache[page] || {};
  } catch (e) { return {}; }
}

const container = document.getElementById('cards-container');
container.innerHTML = imageCards.map(buildCard).join('');

// Restore cached results
const cached = loadResults('traffic');
Object.keys(cached).forEach(imageId => {
  const data = cached[imageId];
  if (data.gemma) renderResults(imageId, data.gemma, `gemma-results-${imageId}`);
  if (data.gemini) renderResults(imageId, data.gemini, `gemini-results-${imageId}`);
});
</script>

</body>
</html>
