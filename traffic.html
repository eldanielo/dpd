<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Construction Sites - Geopost Street AI Companion</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: #0a0c10; color: #e1e4e8; }

    header {
      background: linear-gradient(135deg, #0d1117 0%, #161b22 100%);
      border-bottom: 1px solid #30363d; padding: 28px 40px;
    }
    header h1 { font-size: 24px; font-weight: 600; letter-spacing: -0.3px; }
    header p { color: #8b949e; margin-top: 4px; font-size: 14px; }

    .nav-links { margin-top: 8px; }
    .nav-links a { color: #58a6ff; font-size: 13px; text-decoration: none; }
    .nav-links a:hover { text-decoration: underline; }

    .hero {
      background: linear-gradient(135deg, #1a1040 0%, #0d1117 50%, #0a1628 100%);
      border-bottom: 1px solid #30363d;
      padding: 40px 40px 36px;
      text-align: center;
    }
    .hero-badge {
      display: inline-block; font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px;
      color: #d2a8ff; background: #d2a8ff15; border: 1px solid #d2a8ff30;
      padding: 4px 14px; border-radius: 20px; font-weight: 600; margin-bottom: 16px;
    }
    .hero h2 {
      font-size: 28px; font-weight: 700; letter-spacing: -0.5px;
      background: linear-gradient(135deg, #e1e4e8 0%, #d2a8ff 50%, #58a6ff 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text; margin-bottom: 10px;
    }
    .hero p { color: #8b949e; font-size: 15px; max-width: 640px; margin: 0 auto; line-height: 1.6; }

    .prompt-section { background: #161b22; border: 1px solid #30363d; border-radius: 10px; margin: 24px 40px 0; padding: 0; }
    .prompt-toggle {
      display: flex; align-items: center; justify-content: space-between; padding: 16px 20px;
      cursor: pointer; user-select: none;
    }
    .prompt-toggle h3 { font-size: 12px; text-transform: uppercase; letter-spacing: 1px; color: #8b949e; font-weight: 600; margin: 0; }
    .prompt-toggle .chevron { color: #8b949e; font-size: 14px; transition: transform 0.2s; }
    .prompt-section.collapsed .chevron { transform: rotate(-90deg); }
    .prompt-section.collapsed .prompt-inner { display: none; }
    .prompt-inner { padding: 0 20px 20px; }
    .prompt-box { background: #0d1117; border: 1px solid #30363d; border-radius: 8px; padding: 14px 16px; font-family: 'SF Mono', 'Fira Code', monospace; font-size: 13px; line-height: 1.6; color: #c9d1d9; white-space: pre-wrap; width: 100%; resize: vertical; }
    .prompt-box:focus { outline: none; border-color: #d2a8ff; box-shadow: 0 0 0 3px #d2a8ff20; }

    .cards-container { padding: 24px 40px 48px; display: flex; flex-direction: column; gap: 36px; }

    .image-card {
      background: #161b22; border: 1px solid #30363d; border-radius: 12px;
      overflow: hidden; transition: border-color 0.2s, box-shadow 0.2s;
    }
    .image-card:hover { border-color: #d2a8ff40; box-shadow: 0 4px 24px #d2a8ff08; }

    .image-card-header {
      padding: 18px 24px; border-bottom: 1px solid #30363d;
      display: flex; align-items: center; gap: 14px; flex-wrap: wrap;
      background: linear-gradient(90deg, #161b22 0%, #1a1030 100%);
    }
    .image-card-header h2 { font-size: 17px; font-weight: 600; margin-right: auto; letter-spacing: -0.2px; }

    .analyze-btn {
      background: linear-gradient(135deg, #7c3aed 0%, #a855f7 100%);
      color: #fff; border: 1px solid #a855f766; border-radius: 8px;
      padding: 8px 20px; font-size: 13px; font-weight: 600; cursor: pointer;
      display: inline-flex; align-items: center; gap: 8px;
      transition: all 0.2s; box-shadow: 0 2px 8px #7c3aed30;
    }
    .analyze-btn:hover { background: linear-gradient(135deg, #6d28d9 0%, #9333ea 100%); box-shadow: 0 4px 16px #7c3aed40; transform: translateY(-1px); }
    .analyze-btn:disabled { background: #21262d; color: #484f58; border-color: #30363d; cursor: not-allowed; box-shadow: none; transform: none; }
    .analyze-btn .spinner {
      width: 14px; height: 14px; border: 2px solid #ffffff44; border-top-color: #fff;
      border-radius: 50%; animation: spin 0.6s linear infinite; display: none;
    }
    .analyze-btn.loading .spinner { display: inline-block; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .card-layout { display: grid; grid-template-columns: 2fr 3fr; }
    .card-layout > .image-side { padding: 16px; border-right: 1px solid #30363d; }
    .card-layout > .results-side { display: flex; flex-direction: column; }
    .results-side > div { padding: 16px; }
    .results-side > div:first-child { border-bottom: 1px solid #30363d; }

    .image-preview img { width: 100%; border-radius: 6px; border: 1px solid #30363d; display: block; }

    .col-header {
      font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; color: #8b949e;
      margin-bottom: 10px; padding-bottom: 6px; border-bottom: 1px solid #30363d;
      display: flex; align-items: center; gap: 6px;
    }
    .col-header .dot { width: 8px; height: 8px; border-radius: 50%; }
    .dot-gemma { background: #58a6ff; }
    .dot-gemini { background: #d2a8ff; }

    .restr-row { padding: 6px 0; font-size: 13px; border-bottom: 1px solid #30363d22; }
    .restr-row:last-child { border-bottom: none; }
    .restr-type { font-weight: 600; color: #e1e4e8; }
    .restr-desc { color: #8b949e; font-size: 12px; margin-top: 2px; }
    .restr-impact {
      display: inline-block; font-size: 10px; padding: 1px 6px; border-radius: 3px;
      font-weight: 600; margin-left: 8px; vertical-align: middle;
    }
    .restr-impact.impact-high { background: #da363330; color: #f85149; border: 1px solid #da363360; }
    .restr-impact.impact-medium { background: #d29a2840; color: #d29922; border: 1px solid #d29a2860; }
    .restr-impact.impact-low { background: #23883040; color: #3fb950; border: 1px solid #23883060; }
    .restr-impact.impact-none { background: #30363d; color: #8b949e; border: 1px solid #30363d; }

    .site-assess { border-radius: 6px; padding: 12px 14px; margin-bottom: 12px; }
    .site-assess.assess-yes { background: #23883018; border: 1px solid #23883050; }
    .site-assess.assess-no { background: #da363318; border: 1px solid #da363350; }
    .site-assess.assess-caution { background: #d29a2818; border: 1px solid #d29a2850; }
    .site-assess .verdict { font-size: 14px; font-weight: 700; margin-bottom: 4px; }
    .site-assess .verdict.v-yes { color: #3fb950; }
    .site-assess .verdict.v-no { color: #f85149; }
    .site-assess .verdict.v-caution { color: #d29922; }
    .site-assess .action { font-size: 12px; color: #8b949e; }

    .detection-summary { background: #0d1117; border: 1px solid #30363d; border-radius: 6px; padding: 12px; }
    .detection-summary h4 { font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; color: #8b949e; margin-bottom: 8px; }

    .no-results { color: #484f58; font-style: italic; font-size: 13px; padding: 8px 0; }

    .lightbox { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000000ee; z-index: 1000; justify-content: center; align-items: center; cursor: zoom-out; }
    .lightbox.active { display: flex; }
    .lightbox-inner { position: relative; max-width: 95vw; max-height: 95vh; }
    .lightbox-inner img { max-width: 95vw; max-height: 95vh; border-radius: 8px; }
    .lightbox-close { position: fixed; top: 20px; right: 30px; color: #fff; font-size: 32px; cursor: pointer; z-index: 1001; }

    @media (max-width: 900px) {
      .card-layout { grid-template-columns: 1fr; }
      .card-layout > .image-side { border-right: none; border-bottom: 1px solid #30363d; }
    }
  </style>
</head>
<body>

<header>
  <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;">
    <div>
      <h1>Geopost Street AI Companion <span style="font-weight:400;color:#8b949e;">/ Construction Sites</span></h1>
      <div class="nav-links"><a href="/">&larr; Home</a></div>
    </div>
    <button class="analyze-btn" id="analyze-all-btn" onclick="analyzeAll()">
      <span class="spinner"></span>
      <span>Analyze All Images</span>
    </button>
  </div>
  <div id="analyze-progress" style="margin-top:8px;font-size:13px;color:#8b949e;display:none;"></div>
</header>

<div class="hero">
  <div class="hero-badge">Powered by Gemini Vision</div>
  <h2>Construction Site Detection</h2>
  <p>AI identifies construction obstacles, road closures, and barriers from street-level images, advising drivers whether they can safely navigate through.</p>
</div>

<div class="prompt-section collapsed" id="prompt-section">
  <div class="prompt-toggle" onclick="document.getElementById('prompt-section').classList.toggle('collapsed')">
    <h3>Prompt (same for all models)</h3>
    <span class="chevron">&#9660;</span>
  </div>
  <div class="prompt-inner">
  <textarea class="prompt-box" id="prompt-editor" rows="12">You are a construction site detection AI analyzing street-level images of European cities for delivery drivers. Identify all construction-related obstacles, barriers, restrictions, and hazards visible in the image that could affect a delivery van navigating this area.

For each finding, provide:
- type: the type of obstacle (e.g. "scaffolding", "road_barrier", "lane_closure", "construction_fence", "crane", "excavation", "detour_sign", "temporary_traffic_light", "road_narrowing", "sidewalk_closure", "heavy_machinery", "construction_hoarding")
- description: brief description of what you see and how it affects the road/access
- impact: impact on a delivery van trying to pass or deliver here ("high", "medium", "low", "none")

Also provide an overall assessment:
- passable: can a delivery van safely navigate through this area? ("yes", "no", "with_caution")
- recommended_action: practical advice for the driver

Return ONLY a JSON object with a "obstacles" array and an "assessment" object containing passable and recommended_action.</textarea>
  </div>
</div>

<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <span class="lightbox-close">&times;</span>
  <div class="lightbox-inner" id="lightbox-inner"></div>
</div>

<div class="cards-container" id="cards-container"></div>

<script>
const IMAGE_BASE = 'https://storage.googleapis.com/dpd-street-detection/traffic';

const imageCards = [
  { id: "mannheim_road_closed", location: "Mannheim-Seckenheim (DE) \u2014 Road Closed to Through Traffic, Residents Only" },
  { id: "berlin_intersection_closure", location: "Berlin Altes Stadthaus (DE) \u2014 Intersection Closure with Barriers & Speed Limit" },
  { id: "berlin_lane_closure", location: "Berlin Landsberger Allee (DE) \u2014 Lane Closure with Barriers & Construction Equipment" },
  { id: "cornwall_road_construction", location: "Truro, Cornwall (UK) \u2014 Active Road Construction with Cones & Barriers" },
  { id: "peebles_bridge_closed", location: "Peebles (UK) \u2014 Bridge Closed for Repairs, Road Blocked with Cones" },
  { id: "paris_rue_dupleix_construction", location: "Paris, Rue Dupleix (FR) \u2014 Construction Site Entrance with Truck Warning Signs", ext: "png" }
];

function buildCard(card) {
  const imgSrc = `${IMAGE_BASE}/${card.id}.${card.ext || 'jpg'}`;
  return `
  <div class="image-card" id="card-${card.id}">
    <div class="image-card-header">
      <h2>${card.location}</h2>
      <button class="analyze-btn" id="btn-${card.id}" onclick="analyzeSingle('${card.id}')">
        <span class="spinner"></span>
        <span>Analyze</span>
      </button>
    </div>
    <div class="card-layout">
      <div class="image-side">
        <div class="image-preview">
          <img src="${imgSrc}" alt="${card.location}" onclick="openLightbox('${card.id}')">
        </div>
      </div>
      <div class="results-side">
        <div>
          <div class="col-header"><span class="dot dot-gemma"></span> Gemma 3n E4B-IT</div>
          <div id="gemma-results-${card.id}">
            <div class="detection-summary" style="opacity:0.5;">
              <h4>Detected Obstacles</h4>
              <div class="no-results">Click "Analyze" to run</div>
            </div>
          </div>
        </div>
        <div>
          <div class="col-header"><span class="dot dot-gemini"></span> Gemini 3.1 Pro</div>
          <div id="gemini-results-${card.id}">
            <div class="detection-summary" style="opacity:0.5;">
              <h4>Detected Obstacles</h4>
              <div class="no-results">Click "Analyze" to run</div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>`;
}

function renderAssessment(a) {
  if (!a) return '';
  const p = (a.passable || 'with_caution').toLowerCase();
  const cls = p === 'yes' ? 'assess-yes' : p === 'no' ? 'assess-no' : 'assess-caution';
  const vcls = p === 'yes' ? 'v-yes' : p === 'no' ? 'v-no' : 'v-caution';
  const label = p === 'yes' ? 'PASSABLE' : p === 'no' ? 'NOT PASSABLE' : 'PASSABLE WITH CAUTION';
  return `<div class="site-assess ${cls}">
    <div class="verdict ${vcls}">${label}</div>
    ${a.recommended_action ? `<div class="action">\u27A4 ${a.recommended_action}</div>` : ''}
  </div>`;
}

function renderResults(imageId, modelResult, containerId) {
  const el = document.getElementById(containerId);
  if (!el) return;

  if (modelResult.status === 'error') {
    el.innerHTML = `<div class="detection-summary"><h4>Detected Obstacles</h4>
      <div class="restr-row" style="color:#f85149;">Error: ${modelResult.error}</div></div>`;
    return;
  }

  const parsed = modelResult.result || {};
  const obstacles = parsed.obstacles || parsed.restrictions || [];
  const assessment = parsed.assessment || null;

  let assessHtml = renderAssessment(assessment);

  let rows = '';
  if (obstacles.length === 0) {
    rows = '<div class="no-results">No obstacles detected</div>';
  } else {
    rows = obstacles.map(r => {
      const impact = (r.impact || 'none').toLowerCase();
      const impactCls = impact === 'high' ? 'impact-high' : impact === 'medium' ? 'impact-medium' : impact === 'low' ? 'impact-low' : 'impact-none';
      const impactLabel = impact.charAt(0).toUpperCase() + impact.slice(1);
      return `<div class="restr-row">
        <div class="restr-type">${r.type || 'Unknown'}<span class="restr-impact ${impactCls}">Impact: ${impactLabel}</span></div>
        <div class="restr-desc">${r.description || ''}</div>
      </div>`;
    }).join('');
  }

  el.innerHTML = `${assessHtml}<div class="detection-summary">
    <h4>Detected Obstacles <span style="font-size:11px;color:#8b949e;font-weight:400;">(${obstacles.length} found)</span></h4>
    ${rows}
  </div>`;
}

async function analyzeImage(imageId) {
  ['gemma', 'gemini'].forEach(m => {
    document.getElementById(`${m}-results-${imageId}`).innerHTML =
      `<div class="detection-summary"><h4>Detected Obstacles</h4><div class="restr-row" style="color:#8b949e;">Running...</div></div>`;
  });

  try {
    const resp = await fetch('/analyze-traffic', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ image_id: imageId, prompt: document.getElementById('prompt-editor').value })
    });
    const data = await resp.json();
    renderResults(imageId, data.gemma, `gemma-results-${imageId}`);
    renderResults(imageId, data.gemini, `gemini-results-${imageId}`);
    saveResult('traffic', imageId, data);
  } catch (err) {
    ['gemma', 'gemini'].forEach(m => {
      document.getElementById(`${m}-results-${imageId}`).innerHTML =
        `<div class="detection-summary"><h4>Detected Obstacles</h4><div class="restr-row" style="color:#f85149;">Request failed: ${err.message}</div></div>`;
    });
  }
}

async function analyzeSingle(imageId) {
  const btn = document.getElementById(`btn-${imageId}`);
  btn.classList.add('loading');
  btn.disabled = true;
  btn.querySelector('span:last-child').textContent = 'Analyzing...';
  await analyzeImage(imageId);
  btn.classList.remove('loading');
  btn.disabled = false;
  btn.querySelector('span:last-child').textContent = 'Re-analyze';
}

async function analyzeAll() {
  const btn = document.getElementById('analyze-all-btn');
  const progress = document.getElementById('analyze-progress');
  btn.classList.add('loading');
  btn.disabled = true;
  btn.querySelector('span:last-child').textContent = 'Analyzing...';
  progress.style.display = 'block';

  for (let i = 0; i < imageCards.length; i++) {
    const card = imageCards[i];
    progress.textContent = `Analyzing image ${i + 1} of ${imageCards.length}: ${card.location} ...`;
    await analyzeImage(card.id);
  }

  progress.textContent = `Done - all ${imageCards.length} images analyzed.`;
  btn.classList.remove('loading');
  btn.disabled = false;
  btn.querySelector('span:last-child').textContent = 'Re-analyze All';
}

function openLightbox(imageId) {
  const lb = document.getElementById('lightbox');
  const inner = document.getElementById('lightbox-inner');
  const card = imageCards.find(c => c.id === imageId);
  const ext = card && card.ext ? card.ext : 'jpg';
  inner.innerHTML = `<img src="${IMAGE_BASE}/${imageId}.${ext}" alt="${imageId}">`;
  lb.classList.add('active');
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('active');
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });

function saveResult(page, imageId, data) {
  try {
    const cache = JSON.parse(localStorage.getItem('dpd-cache') || '{}');
    if (!cache[page]) cache[page] = {};
    cache[page][imageId] = data;
    localStorage.setItem('dpd-cache', JSON.stringify(cache));
  } catch (e) {}
}

function loadResults(page) {
  try {
    const cache = JSON.parse(localStorage.getItem('dpd-cache') || '{}');
    return cache[page] || {};
  } catch (e) { return {}; }
}

const container = document.getElementById('cards-container');
container.innerHTML = imageCards.map(buildCard).join('');

// Restore cached results
const cached = loadResults('traffic');
Object.keys(cached).forEach(imageId => {
  const data = cached[imageId];
  if (data.gemma) renderResults(imageId, data.gemma, `gemma-results-${imageId}`);
  if (data.gemini) renderResults(imageId, data.gemini, `gemini-results-${imageId}`);
});
</script>

</body>
</html>
